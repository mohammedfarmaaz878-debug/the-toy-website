<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Toy Trunk</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #fff7fb;
        }

        header {
            background: #f472b6;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .page {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .toy {
            background: white;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .toy:hover {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .img {
            font-size: 60px;
        }

        button {
            background: #f472b6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        .cart-box {
            text-align: left;
        }

        .wa {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>🧸 The Toy Trunk</h1>
    </header>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <div class="card">
            <div class="img">🧸</div>
            <h2>Welcome to The Toy Trunk</h2>
            <p>Cute soft toys for every special moment 💖</p>
            <button onclick="showPage('products')">Shop Now</button>
        </div>
    </div>

    <!-- PRODUCT PAGE -->
    <div id="products" class="page">
        <div class="card">
            <h2>Our Soft Toys</h2>

            <div class="toy" onclick="selectToy('My Toy',799)">
                <img src="the.toy.trunk/WhatsApp Image 2026-04-15 at 5.11.53 PM.jpeg"
                    style="width:100%; height: 500px; object-fit:cover; border-radius:10px;">
                <h3>My Toy</h3>
                <p>₹400</p>
            </div>

            <div class="toy" onclick="selectToy('My Toy',799)">
                <img src="the.toy.trunk/WhatsApp Image 2026-04-15 at 5.06.12 PM.jpeg"
                    style="width:100%; height: 500px; object-fit:cover; border-radius:10px;">
                <h3>My Toy</h3>
                <p>₹400</p>
            </div>

            <div class="toy" onclick="selectToy('My Toy',799)">
                <img src="the.toy.trunk/IMG-20260415-WA0011.jpg"
                    style="width:100%; height: 500px; object-fit:cover; border-radius:10px;">
                <h3>My Toy</h3>
                <p>₹400</p>
            </div>

            <div class="toy" onclick="selectToy('My Toy',799)">
                <img src="the.toy.trunk/IMG-20260415-WA0010.jpg"
                    style="width:100%; height: 500px; object-fit:cover; border-radius:10px;">
                <h3>My Toy</h3>
                <p>₹400</p>
            </div>

            <div class="toy" onclick="selectToy('My Toy',799)">
                <img src="the.toy.trunk/IMG-20260415-WA0008.jpg"
                    style="width:100%; height: 500px; object-fit:cover; border-radius:10px;">
                <h3>My Toy</h3>
                <p>₹400</p>
            </div>


            <div class="toy" onclick="selectToy('My Toy',799)">
                <img src="the.toy.trunk/IMG-20260415-WA0007.jpg"
                    style="width:100%; height: 500px; object-fit:cover; border-radius:10px;">
                <h3>My Toy</h3>
                <p>₹400</p>
            </div>

            <div class="toy" onclick="selectToy('My Toy',799)">
                <img src="the.toy.trunk/IMG-20260415-WA0006.jpg"
                    style="width:100%; height: 500px; object-fit:cover; border-radius:10px;">
                <h3>My Toy</h3>
                <p>₹400</p>
            </div>
        </div>

        <div id="details" style="margin-top:20px; display:none;">
            <h3 id="toyName"></h3>
            <p id="toyPrice"></p>
            <button onclick="goToCart()">Add to Cart</button>
        </div>

    </div>
    </div>

    <!-- CART PAGE -->
    <div id="cart" class="page">
        <div class="card cart-box">
            <h2>🛒 Order Summary</h2>

            <p id="productLine"></p>
            <p>Delivery: ₹50</p>
            <p>Tax: ₹90</p>
            <h3 id="total"></h3>

            <button onclick="placeOrder()">Order on WhatsApp</button>
        </div>
    </div>

    <!-- WhatsApp Button -->
    <a class="wa" id="waLink" target="_blank">💬</a>

    <script>
        let selectedToy = "";
        let selectedPrice = 0;

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
        }

        function selectToy(name, price) {
            selectedToy = name;
            selectedPrice = price;
            document.getElementById('details').style.display = 'block';
            document.getElementById('toyName').innerText = name;
            document.getElementById('toyPrice').innerText = "Price: ₹" + price;
        }

        function goToCart() {
            showPage('cart');

            let total = selectedPrice + 50 + 90;

            document.getElementById('productLine').innerText = selectedToy + " - ₹" + selectedPrice;
            document.getElementById('total').innerText = "Total: ₹" + total;
        }

        function placeOrder() {
            let msg = `Hi, I want to buy ${selectedToy} for ₹${selectedPrice}`;
            let url = "https://wa.me/919606038707?text=" + encodeURIComponent(msg);
            window.open(url, "_blank");
        }

        document.getElementById('waLink').href =
            "https://wa.me/919606038707?text=Hi%20I%20am%20interested%20in%20soft%20toys";
    </script>

</body>

</html>
